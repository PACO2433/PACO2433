<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALDREX TOTAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json"> <meta name="theme-color" content="#1e3a8a">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* VARIABLES */
:root{
--bg:#0f172a;
--card:#1e293b;
--card-soft:#273449;
--primary:#3b82f6;
--primary-hover:#2563eb;
--text:#e2e8f0;
--muted:#94a3b8;
--border:#334155;
}

/* GLOBAL */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
}

/* LOGIN */
#loginBox{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
}

/* TARJETAS */
.card{
background:rgba(30,41,59,0.85);
backdrop-filter:blur(10px);
padding:30px;
border-radius:16px;
width:340px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.05);
animation:fadeIn 0.6s ease;
}

/* INPUTS */
input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid var(--border);
background:var(--card-soft);
color:white;
transition:0.3s;
}

input:focus,select:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 10px rgba(59,130,246,0.5);
}

/* BOTONES */
button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,var(--primary),#60a5fa);
color:white;
font-weight:bold;
transition:0.3s;
box-shadow:0 5px 15px rgba(59,130,246,0.3);
}

button:hover{
background:linear-gradient(135deg,var(--primary-hover),#3b82f6);
transform:translateY(-2px);
}

/* APP */
#app{
display:none;
margin-left:220px;
}

/* SIDEBAR */
nav{
position:fixed;
top:0;
left:0;
width:220px;
height:100vh;
display:flex;
flex-direction:column;
gap:10px;
padding:20px 10px;
background:rgba(30,41,59,0.95);
backdrop-filter:blur(10px);
border-right:1px solid var(--border);
z-index:100;
}

/* LOGO */
nav h2{
text-align:center;
color:#60a5fa;
margin-bottom:10px;
}

/* BOTONES SIDEBAR */
nav button{
width:100%;
text-align:left;
background:var(--card-soft);
padding:12px;
border-radius:10px;
}

nav button:hover{
background:var(--primary);
}

/* SECCIONES */
.section{
display:none;
padding:25px;
animation:fadeIn 0.5s ease;
}

.active{
display:block;
}

/* TITULOS */
h2{
margin-bottom:15px;
color:#60a5fa;
border-left:4px solid var(--primary);
padding-left:10px;
}

/* TABLAS */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:var(--card);
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

th{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
padding:14px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid var(--border);
}

tr:hover{
background:var(--card-soft);
}

/* LISTAS */
ul{
list-style:none;
padding:0;
}

li{
background:var(--card);
margin:8px 0;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

li:hover{
background:var(--card-soft);
}

/* BOTONES EN TABLAS */
td button{
margin-right:5px;
padding:6px 10px;
font-size:12px;
}

/* ANIMACIONES */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE */
@media (max-width:768px){

/* NAV ARRIBA */
nav{
position:relative;
width:100%;
height:auto;
flex-direction:row;
overflow-x:auto;
}

#app{
margin-left:0;
}

/* BOTONES */
nav button{
min-width:120px;
text-align:center;
}

/* TABLAS A TARJETAS */
table, thead{
display:none;
}

tbody tr{
display:block;
background:var(--card);
margin-bottom:10px;
padding:15px;
border-radius:12px;
}

td{
display:block;
border:none;
padding:5px 0;
}

td:before{
font-weight:bold;
color:var(--primary);
display:block;
}

}
/* FONDO DINÁMICO BLOQUES */
.bg-animacion{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:0;
pointer-events:none; /* 🔥 ESTO ARREGLA TODO */
}

/* BLOQUES */
.bg-animacion span{
position:absolute;
display:block;
width:40px;
height:40px;
background:rgba(59,130,246,0.15);
animation:animarBloques 20s linear infinite;
border-radius:6px;
}

/* DIFERENTES TAMAÑOS Y POSICIONES */
.bg-animacion span:nth-child(1){
left:10%; animation-duration:15s; width:30px; height:30px;
}
.bg-animacion span:nth-child(2){
left:20%; animation-duration:18s;
}
.bg-animacion span:nth-child(3){
left:30%; animation-duration:12s; width:50px; height:50px;
}
.bg-animacion span:nth-child(4){
left:40%; animation-duration:20s;
}
.bg-animacion span:nth-child(5){
left:50%; animation-duration:14s;
}
.bg-animacion span:nth-child(6){
left:60%; animation-duration:16s;
}
.bg-animacion span:nth-child(7){
left:70%; animation-duration:22s;
}
.bg-animacion span:nth-child(8){
left:80%; animation-duration:17s;
}
.bg-animacion span:nth-child(9){
left:90%; animation-duration:19s;
}

/* ANIMACIÓN */
@keyframes animarBloques{
0%{
top:100%;
transform:rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
80%{
opacity:1;
}
100%{
top:-10%;
transform:rotate(360deg);
opacity:0;
}
}

/* ASEGURAR QUE EL LOGIN ESTÉ ENCIMA */
#loginBox{
position:relative;
overflow:hidden;
}

.card{
position:relative;
z-index:1;
}
</style>
</head>

<body>
<div class="bg-animacion"></div>
<div id="loginBox">
<div class="card">
<h2>ALDREX</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app">

<nav>
<h3>ALDREX</h3>
<button id="navDashboard" onclick="show('dashboard')">📊 Dashboard</button>
<button id="navProyectos" onclick="show('proyectos')">🏗 Proyectos</button>
<button id="navSolicitudes" onclick="show('solicitudes')">📩 Solicitudes</button>
<button id="navUsuarios" onclick="show('usuarios')">👤 Usuarios</button>
<button id="navConfig" onclick="show('config')">⚙ Config</button>
<button onclick="logout()">Salir</button>
</nav>

<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<canvas id="grafica"></canvas>
</div>

<div id="proyectos" class="section">
<h2>Proyectos</h2>

<input id="nombreProyecto" placeholder="Nombre">
<input id="clienteProyecto" placeholder="Cliente">
<input id="ubicacionProyecto" placeholder="Ubicación">
<input id="presupuesto" type="number" placeholder="Presupuesto">
<input id="avanceProyecto" type="number" placeholder="Avance">

<select id="estadoProyecto">
<option>Planeación</option>
<option>En proceso</option>
<option>Finalizado</option>
</select>

<button onclick="guardarProyecto()">Guardar</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Cliente</th>
<th>Ubicación</th>
<th>Presupuesto</th>
<th>Estado</th>
<th>Avance</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaProyectos"></tbody>
</table>
</div>

<div id="solicitudes" class="section">
<h2>Solicitudes</h2>

<input id="tipoSolicitud" placeholder="Tipo">
<input id="proyectoSolicitud" placeholder="Proyecto">
<input id="detalleSolicitud" placeholder="Detalle">

<button onclick="crearSolicitud()">Enviar</button>

<table>
<thead>
<tr>
<th>Tipo</th>
<th>Proyecto</th>
<th>Detalle</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaSolicitudes"></tbody>
</table>
</div>

<div id="usuarios" class="section">
<h2>Usuarios</h2>

<input id="nombreCompleto" placeholder="Nombre">
<input id="nuevoUser" placeholder="Usuario">
<input id="nuevoPass" placeholder="Contraseña">

<select id="rolUser">
<option value="admin">admin</option>
<option value="supervisor">supervisor</option>
<option value="empleado">empleado</option>
</select>

<input id="area" placeholder="Área">

<button onclick="guardarUsuario()">Guardar Usuario</button>

<ul id="listaUsuarios"></ul>
</div>

<div id="config" class="section">
<h2>Configuración</h2>
<button onclick="exportarPDF()">Exportar PDF</button>
</div>

</div>

<script>
const user = document.getElementById("user");
const pass = document.getElementById("pass");
const loginBox = document.getElementById("loginBox");
const app = document.getElementById("app");

/* NAV */
const navDashboard = document.getElementById("navDashboard");
const navProyectos = document.getElementById("navProyectos");
const navSolicitudes = document.getElementById("navSolicitudes");
const navUsuarios = document.getElementById("navUsuarios");
const navConfig = document.getElementById("navConfig");

/* PROYECTOS */
const nombreProyecto = document.getElementById("nombreProyecto");
const clienteProyecto = document.getElementById("clienteProyecto");
const ubicacionProyecto = document.getElementById("ubicacionProyecto");
const presupuesto = document.getElementById("presupuesto");
const avanceProyecto = document.getElementById("avanceProyecto");
const estadoProyecto = document.getElementById("estadoProyecto");
const tablaProyectos = document.getElementById("tablaProyectos");

/* SOLICITUDES */
const tipoSolicitud = document.getElementById("tipoSolicitud");
const proyectoSolicitud = document.getElementById("proyectoSolicitud");
const detalleSolicitud = document.getElementById("detalleSolicitud");
const tablaSolicitudes = document.getElementById("tablaSolicitudes");

/* USUARIOS */
const nombreCompleto = document.getElementById("nombreCompleto");
const nuevoUser = document.getElementById("nuevoUser");
const nuevoPass = document.getElementById("nuevoPass");
const rolUser = document.getElementById("rolUser");
const area = document.getElementById("area");
const listaUsuarios = document.getElementById("listaUsuarios");

/* GRAFICA */
const grafica = document.getElementById("grafica");
let usuarioActual=null;
let chart=null;
let editIndex=null;
let editUserIndex=null;

let db=JSON.parse(localStorage.getItem("aldrexDB"))||{
usuarios:[{nombre:"Admin",user:"admin",pass:btoa("admin123"),rol:"admin",area:"General"}],
proyectos:[],
solicitudes:[]
};

function save(){localStorage.setItem("aldrexDB",JSON.stringify(db));}

/* LOGIN */
function login(){
let u=user.value.trim();
let p=btoa(pass.value.trim());
let ok=db.usuarios.find(x=>x.user===u && x.pass===p);

if(ok){
usuarioActual=ok;
loginBox.style.display="none";
app.style.display="block";
render();
aplicarPermisos();
}else alert("Error en credenciales");
}

function logout(){location.reload();}

/* PERMISOS */
function aplicarPermisos(){

if(usuarioActual.rol==="admin") return;

if(usuarioActual.rol==="supervisor"){
navUsuarios.style.display="none";
}

if(usuarioActual.rol==="empleado"){
navDashboard.style.display="none";
navProyectos.style.display="none";
navUsuarios.style.display="none";
navConfig.style.display="none";
}
}

/* NAV */
function show(id){

if(usuarioActual.rol==="empleado" && id!=="solicitudes"){
alert("No tienes acceso");
return;
}

if(usuarioActual.rol==="supervisor" && id==="usuarios"){
alert("No autorizado");
return;
}

document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* PROYECTOS */
function guardarProyecto(){

if(usuarioActual.rol==="empleado"){
    alert("No autorizado");
    return;
}

if(
!nombreProyecto.value ||
!clienteProyecto.value ||
!ubicacionProyecto.value
){
    alert("Completa todos los campos");
    return;
}

let data={
nombre:nombreProyecto.value,
cliente:clienteProyecto.value,
ubicacion:ubicacionProyecto.value,
presupuesto:Number(presupuesto.value||0),
estado:estadoProyecto.value,
avance:Number(avanceProyecto.value||0)
};

if(editIndex===null){
db.proyectos.push(data);
}else{
db.proyectos[editIndex]=data;
editIndex=null;
}

save();
limpiarProyecto();
render();
}
function editarProyecto(i){
let p=db.proyectos[i];
nombreProyecto.value=p.nombre;
clienteProyecto.value=p.cliente;
ubicacionProyecto.value=p.ubicacion;
presupuesto.value=p.presupuesto;
avanceProyecto.value=p.avance;
estadoProyecto.value=p.estado;
editIndex=i;
}

function eliminarProyecto(i){
if(usuarioActual.rol!=="admin"){alert("Solo admin");return;}
db.proyectos.splice(i,1);
save();
render();
}

function limpiarProyecto(){
nombreProyecto.value="";
clienteProyecto.value="";
ubicacionProyecto.value="";
presupuesto.value="";
avanceProyecto.value="";
}

/* SOLICITUDES */
function crearSolicitud(){
db.solicitudes.push({
tipo:tipoSolicitud.value,
proyecto:proyectoSolicitud.value,
detalle:detalleSolicitud.value,
estado:"Pendiente"
});
save();
render();
}

function aprobar(i){
db.solicitudes[i].estado="Aprobado";
save();
render();
}

function eliminarSolicitud(i){
if(usuarioActual.rol==="empleado"){alert("No autorizado");return;}
db.solicitudes.splice(i,1);
save();
render();
}

/* USUARIOS */
function guardarUsuario(){
if(usuarioActual.rol!=="admin"){alert("Solo admin");return;}

let userVal=nuevoUser.value.trim();

let existe=db.usuarios.find((u,i)=>u.user===userVal && i!==editUserIndex);
if(existe){alert("Usuario duplicado");return;}

let data={
nombre:nombreCompleto.value,
user:userVal,
pass:btoa(nuevoPass.value||"123"),
rol:rolUser.value,
area:area.value
};

if(editUserIndex===null){
db.usuarios.push(data);
}else{
db.usuarios[editUserIndex]=data;
editUserIndex=null;
}

save();
limpiarUsuario();
render();
}

function editarUsuario(i){
let u=db.usuarios[i];
nombreCompleto.value=u.nombre;
nuevoUser.value=u.user;
nuevoPass.value="";
rolUser.value=u.rol;
area.value=u.area;
editUserIndex=i;
}

function eliminarUsuario(i){
if(usuarioActual.rol!=="admin"){alert("Solo admin");return;}
if(db.usuarios[i].user===usuarioActual.user){
alert("No puedes eliminarte");
return;
}
db.usuarios.splice(i,1);
save();
render();
}

function limpiarUsuario(){
nombreCompleto.value="";
nuevoUser.value="";
nuevoPass.value="";
area.value="";
editUserIndex=null;
}

/* RENDER */
function render(){

tablaProyectos.innerHTML=db.proyectos.map((p,i)=>`
<tr>
<td>${p.nombre}</td>
<td>${p.cliente}</td>
<td>${p.ubicacion}</td>
<td>${p.presupuesto}</td>
<td>${p.estado}</td>
<td>${p.avance}%</td>
<td>
<button onclick="editarProyecto(${i})">Editar</button>
${usuarioActual.rol==="admin"?`<button onclick="eliminarProyecto(${i})">Eliminar</button>`:""}
</td>
</tr>`).join("");

tablaSolicitudes.innerHTML=db.solicitudes.map((s,i)=>`
<tr>
<td>${s.tipo}</td>
<td>${s.proyecto}</td>
<td>${s.detalle}</td>
<td>${s.estado}</td>
<td>
<button onclick="aprobar(${i})">OK</button>
<button onclick="eliminarSolicitud(${i})">Eliminar</button>
</td>
</tr>`).join("");

listaUsuarios.innerHTML=db.usuarios.map((u,i)=>`
<li>
${u.nombre} - ${u.rol}
<button onclick="editarUsuario(${i})">Editar</button>
<button onclick="eliminarUsuario(${i})">Eliminar</button>
</li>`).join("");

if(chart) chart.destroy();

if(db.proyectos.length>0){
chart=new Chart(grafica,{
type:"bar",
data:{
labels:db.proyectos.map(p=>p.nombre),
datasets:[{
label:"Avance",
data:db.proyectos.map(p=>p.avance)
}]
}
});
}

}

/* PDF */

async function exportarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 10;

/* TITULO */
doc.setFontSize(18);
doc.text("REPORTE DE OBRA - ALDREX", 10, y);
y += 10;

/* FECHA */
doc.setFontSize(10);
doc.text("Fecha: " + new Date().toLocaleDateString(), 10, y);
y += 10;

/* SEPARADOR */
doc.line(10, y, 200, y);
y += 8;

/* SECCIÓN PROYECTOS */
doc.setFontSize(14);
doc.text("REGISTRO DE PROYECTOS", 10, y);
y += 8;

doc.setFontSize(10);

db.proyectos.forEach((p, i)=>{

doc.text(`Proyecto: ${p.nombre}`, 10, y); y+=6;
doc.text(`Cliente: ${p.cliente}`, 10, y); y+=6;
doc.text(`Ubicación: ${p.ubicacion}`, 10, y); y+=6;
doc.text(`Estado: ${p.estado}`, 10, y); y+=6;
doc.text(`Presupuesto: $${p.presupuesto}`, 10, y); y+=6;

y+=3;

/* TABLA DE AVANCE */
doc.setFontSize(12);
doc.text("Tabla de Avance", 10, y);
y+=6;

doc.setFontSize(10);

/* ENCABEZADO */
doc.setFillColor(37,99,235);
doc.rect(10,y,180,8,'F');
doc.setTextColor(255,255,255);
doc.text("Proyecto",12,y+5);
doc.text("Avance %",120,y+5);

y+=8;

/* DATOS */
doc.setTextColor(0,0,0);

doc.rect(10,y,180,8);
doc.text(p.nombre,12,y+5);
doc.text(p.avance+"%",120,y+5);

y+=12;

/* SEPARADOR ENTRE PROYECTOS */
doc.setDrawColor(200);
doc.line(10,y,200,y);
y+=6;

/* SALTO DE PAGINA AUTOMATICO */
if(y > 270){
doc.addPage();
y = 10;
}

});

/* SECCIÓN SOLICITUDES */
doc.addPage();
y=10;

doc.setFontSize(14);
doc.text("SOLICITUDES",10,y);
y+=10;

doc.setFontSize(10);

db.solicitudes.forEach((s,i)=>{

doc.text(`Tipo: ${s.tipo}`,10,y); y+=5;
doc.text(`Proyecto: ${s.proyecto}`,10,y); y+=5;
doc.text(`Detalle: ${s.detalle}`,10,y); y+=5;
doc.text(`Estado: ${s.estado}`,10,y); y+=7;

if(y > 270){
doc.addPage();
y=10;
}

});

/* GUARDAR */
doc.save("REPORTE_ALDREX.pdf");

}


const contenedor = document.querySelector('.bg-animacion');

for(let i = 0; i < 30; i++){
    let bloque = document.createElement('span');
    bloque.style.left = Math.random() * 100 + "%";
    bloque.style.animationDuration = (10 + Math.random()*20) + "s";
    bloque.style.width = bloque.style.height = (20 + Math.random()*60) + "px";
    contenedor.appendChild(bloque);
}

</script>
</body>
</html>
